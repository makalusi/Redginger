<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code — RED GINGER Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0b0708; color: #f4ede4; }
    .font-display { font-family: 'Bebas Neue', sans-serif; }

    /* ---- screen layout ---- */
    .screen-card {
      background: #161010;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 36px;
    }

    /* QR wrapper — white bg needed for scanners */
    #qr-box {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      display: inline-block;
    }
    #qr-box canvas, #qr-box img { display: block; }

    /* url input */
    .url-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #f4ede4;
      padding: 10px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      width: 100%;
      box-sizing: border-box;
      outline: none;
    }
    .url-input:focus { border-color: #dc2626; box-shadow: 0 0 0 3px rgba(220,38,38,0.2); }

    /* ---- PRINT STYLES ---- */
    @media print {
      body { background: #fff !important; color: #000 !important; margin: 0; }
      .no-print { display: none !important; }
      .print-page {
        display: flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 0;
      }
      .print-logo { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: #c0392b; letter-spacing: 0.05em; text-align: center; margin-bottom: 4px; }
      .print-tagline { font-size: 0.78rem; color: #666; text-align: center; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 28px; }
      .print-qr-wrap { background: #fff; border: 3px solid #c0392b; border-radius: 16px; padding: 24px; display: inline-block; }
      .print-cta { font-size: 1rem; font-weight: 700; color: #222; text-align: center; margin-top: 20px; letter-spacing: 0.05em; }
      .print-url { font-size: 0.72rem; color: #888; text-align: center; margin-top: 6px; }
      #qr-box { background: #fff; padding: 0; border-radius: 0; }
      .screen-card, .screen-wrapper { display: none !important; }
    }

    @media not print {
      .print-page { display: none !important; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 py-16">

  <!-- ===== PRINT PAGE (hidden on screen, shown when printing) ===== -->
  <div class="print-page">
    <div class="print-logo">RED GINGER</div>
    <div class="print-tagline">Pan-Asian Cuisine · Nairobi, Kenya</div>
    <div class="print-qr-wrap">
      <div id="qr-print"></div>
    </div>
    <div class="print-cta">Scan to view our full menu</div>
    <div class="print-url" id="print-url-label"></div>
  </div>

  <!-- ===== SCREEN UI ===== -->
  <div class="screen-wrapper w-full max-w-xl">

    <!-- header -->
    <div class="text-center mb-10 no-print">
      <a href="index.html" class="inline-block mb-4 text-white/40 hover:text-white text-xs uppercase tracking-widest transition">
        ← Back to site
      </a>
      <h1 class="font-display text-5xl text-white tracking-tight">QR CODE</h1>
      <p class="text-white/50 text-sm mt-1">Scan → Red Ginger Menu</p>
    </div>

    <div class="screen-card no-print">

      <!-- URL field -->
      <label class="block text-xs uppercase tracking-widest text-white/50 mb-2">Menu URL</label>
      <div class="flex gap-2 mb-8">
        <input id="url-input" class="url-input" type="url" value="https://redginger.vercel.app/menu.html">
        <button id="btn-generate"
          class="shrink-0 bg-red-600 hover:bg-red-500 transition text-white text-xs font-bold uppercase tracking-widest px-5 py-2.5 rounded-lg">
          Generate
        </button>
      </div>

      <!-- QR output -->
      <div class="flex flex-col items-center gap-6">
        <div id="qr-box">
          <!-- qrcode.js renders here -->
        </div>

        <p id="qr-url-display" class="text-white/40 text-xs text-center break-all"></p>

        <!-- action buttons -->
        <div class="flex gap-3 flex-wrap justify-center">
          <button id="btn-download"
            class="inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 transition border border-white/15 text-white text-xs font-semibold uppercase tracking-widest px-5 py-2.5 rounded-lg">
            <iconify-icon icon="solar:download-linear" width="15"></iconify-icon>
            Download PNG
          </button>
          <button id="btn-print"
            class="inline-flex items-center gap-2 bg-red-600 hover:bg-red-500 transition text-white text-xs font-semibold uppercase tracking-widest px-5 py-2.5 rounded-lg">
            <iconify-icon icon="solar:printer-linear" width="15"></iconify-icon>
            Print
          </button>
        </div>

        <!-- tip -->
        <p class="text-white/30 text-xs text-center max-w-xs leading-relaxed">
          Print this and place it on tables, at the entrance, or on takeaway packaging so guests can browse the menu on their phones.
        </p>
      </div>

    </div>
  </div><!-- /screen-wrapper -->

  <script>
  (function () {

    var MENU_URL  = 'https://redginger.vercel.app/menu.html';
    var QR_SIZE   = 256;

    /* refs */
    var urlInput    = document.getElementById('url-input');
    var qrBox       = document.getElementById('qr-box');
    var qrPrint     = document.getElementById('qr-print');
    var urlDisplay  = document.getElementById('qr-url-display');
    var printLabel  = document.getElementById('print-url-label');
    var btnGenerate = document.getElementById('btn-generate');
    var btnDownload = document.getElementById('btn-download');
    var btnPrint    = document.getElementById('btn-print');

    var qrScreen = null;
    var qrPrintObj = null;

    function makeQR(container, url, size) {
      container.innerHTML = '';
      return new QRCode(container, {
        text:           url,
        width:          size,
        height:         size,
        colorDark:      '#000000',
        colorLight:     '#ffffff',
        correctLevel:   QRCode.CorrectLevel.H
      });
    }

    function generate() {
      var url = urlInput.value.trim();
      if (!url) { alert('Please enter a URL.'); return; }

      qrScreen   = makeQR(qrBox,   url, QR_SIZE);
      qrPrintObj = makeQR(qrPrint, url, 320);

      urlDisplay.textContent  = url;
      printLabel.textContent  = url;
    }

    /* initial render */
    generate();

    btnGenerate.addEventListener('click', generate);
    urlInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') generate(); });

    /* download PNG */
    btnDownload.addEventListener('click', function () {
      var canvas = qrBox.querySelector('canvas');
      if (!canvas) { alert('Generate a QR code first.'); return; }

      /* add white padding + Red Ginger label */
      var pad  = 24;
      var lbl  = 36;
      var out  = document.createElement('canvas');
      out.width  = QR_SIZE + pad * 2;
      out.height = QR_SIZE + pad * 2 + lbl;
      var ctx = out.getContext('2d');

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, out.width, out.height);

      /* border */
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth   = 3;
      ctx.strokeRect(4, 4, out.width - 8, out.height - 8 - lbl + 4);

      /* qr */
      ctx.drawImage(canvas, pad, pad, QR_SIZE, QR_SIZE);

      /* label */
      ctx.fillStyle   = '#c0392b';
      ctx.font        = 'bold 15px sans-serif';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('RED GINGER — Scan for Menu', out.width / 2, QR_SIZE + pad + lbl / 2);

      var a   = document.createElement('a');
      a.href  = out.toDataURL('image/png');
      a.download = 'red-ginger-menu-qr.png';
      a.click();
    });

    /* print */
    btnPrint.addEventListener('click', function () { window.print(); });

  })();
  </script>
</body>
</html>
